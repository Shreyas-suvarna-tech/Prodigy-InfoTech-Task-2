<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Stopwatch </title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0c0f1c, #03050b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
    }

    /* dark glassmorphic card */
    .sw-card {
      background: rgba(18, 22, 35, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 2.25rem;
      border: 1px solid rgba(72, 85, 106, 0.45);
      padding: 2rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    @media (max-width: 500px) {
      .sw-card {
        padding: 1.5rem 1.2rem;
      }
      .sw-display {
        font-size: 54px !important;
      }
      .sw-ms {
        font-size: 28px !important;
      }
      .sw-btn {
        padding: 10px 14px;
        min-width: 70px;
        font-size: 11px;
      }
    }

    .sw-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #a5b3da;
      text-align: center;
      margin-bottom: 0.75rem;
      word-spacing: 2px;
    }

    .sw-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 78px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-align: center;
      background: linear-gradient(135deg, #f0f3ff, #cfdbf5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      line-height: 1.1;
      padding: 1rem 0 0.6rem;
      border-bottom: 1px solid rgba(72, 85, 106, 0.4);
      margin-bottom: 2rem;
      user-select: none;
    }

    .sw-display span {
      background: linear-gradient(135deg, #f0f3ff, #cfdbf5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sw-ms {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: 0;
      opacity: 0.9;
    }

    /* button panel with 4 buttons */
    .sw-controls {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    /* base button style */
    .sw-btn {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 11px 20px;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      min-width: 88px;
      color: white;
      background: #2a2f3f;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .sw-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .sw-btn:disabled {
      opacity: 0.45;
      transform: none;
      cursor: not-allowed;
      filter: grayscale(0.1);
    }

    /* ----- SPECIFIC BUTTON COLORS ----- */
    /* START button: GREEN (default) & RUNNING state */
    .sw-btn.start-btn {
      background: #1f9a5e;
      box-shadow: 0 6px 12px rgba(31, 154, 94, 0.25), inset 0 1px 0 rgba(255,255,240,0.2);
    }
    .sw-btn.start-btn:hover {
      background: #168250;
      transform: translateY(-2px);
    }
    /* RUNNING state (when active) - brighter intense green with pulse */
    .sw-btn.start-btn.running-active {
      background: #0f7c4a;
      box-shadow: 0 0 12px rgba(80, 227, 165, 0.5), inset 0 1px 0 #8effcf;
      text-shadow: 0 0 3px rgba(0,0,0,0.3);
      letter-spacing: 0.1em;
    }
    .sw-btn.start-btn.running-active:hover {
      background: #0b633a;
      transform: translateY(-2px);
    }

    /* PAUSE button: AMBER / ORANGE */
    .sw-btn.pause-btn {
      background: #e68a2e;
      box-shadow: 0 6px 12px rgba(230, 138, 46, 0.3), inset 0 1px 0 #ffe0b5;
      color: white;
    }
    .sw-btn.pause-btn:hover {
      background: #cf7419;
      transform: translateY(-2px);
    }

    /* LAP button: YELLOW */
    .sw-btn.lap-btn {
      background: #e6a017;
      color: #1f1b0e;
      box-shadow: 0 6px 12px rgba(230, 160, 23, 0.3), inset 0 1px 0 #ffe2a3;
    }
    .sw-btn.lap-btn:hover {
      background: #cf8b0c;
      color: #0a0802;
      transform: translateY(-2px);
    }

    /* RESET button: RED */
    .sw-btn.reset-btn {
      background: #c73f2b;
      box-shadow: 0 6px 12px rgba(199, 63, 43, 0.3), inset 0 1px 0 #ffa28c;
    }
    .sw-btn.reset-btn:hover {
      background: #aa331f;
      transform: translateY(-2px);
    }

    /* lap section header + container (dark mode) */
    .sw-lap-header {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #93a0c2;
      padding: 0 6px 10px;
      border-bottom: 1px solid rgba(72, 85, 106, 0.5);
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .sw-laps {
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .sw-laps::-webkit-scrollbar {
      width: 5px;
    }
    .sw-laps::-webkit-scrollbar-track {
      background: #1e2332;
      border-radius: 10px;
    }
    .sw-laps::-webkit-scrollbar-thumb {
      background: #475e7c;
      border-radius: 10px;
    }

    .sw-lap-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 11px 6px;
      border-bottom: 1px solid rgba(64, 78, 102, 0.3);
      font-size: 14px;
      color: #e6edf5;
      transition: background 0.12s;
    }

    .sw-lap-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .sw-lap-num {
      color: #8d9ac2;
      font-size: 12px;
      font-weight: 500;
      min-width: 54px;
      letter-spacing: 0.2px;
    }

    .sw-lap-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 460;
      letter-spacing: 0.2px;
      color: #cbd5ff;
    }

    .sw-lap-delta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      color: #96a2c9;
      min-width: 100px;
      text-align: right;
    }

    .lap-best {
      color: #50e3a5;
      font-weight: 700;
      text-shadow: 0 0 3px rgba(80, 227, 165, 0.3);
    }

    .lap-worst {
      color: #ff8a6c;
      font-weight: 600;
    }

    #lap-section {
      transition: opacity 0.2s;
    }

    .empty-lap-message {
      text-align: center;
      font-size: 12px;
      color: #5e6f92;
      padding: 28px 0 12px;
      letter-spacing: 0.5px;
      font-family: monospace;
      font-weight: 400;
    }

    @keyframes fadeSlideIn {
      0% { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .sw-lap-row {
      animation: fadeSlideIn 0.2s ease-out;
    }
    
    /* subtle running pulse for start button text */
    @keyframes softGlow {
      0% { text-shadow: 0 0 0px rgba(80,227,165,0.3); }
      100% { text-shadow: 0 0 4px rgba(80,227,165,0.7); }
    }
    .running-active {
      animation: softGlow 1.2s infinite alternate;
    }
  </style>
</head>
<body>

<div class="sw-card">
  <div class="sw-label"> STOPWATCH </div>

  <div class="sw-display">
    <span id="main-time">00:00</span><span class="sw-ms">.<span id="ms-time">00</span></span>
  </div>

  <div class="sw-controls">
    <button class="sw-btn start-btn" id="startBtn">Start</button>
    <button class="sw-btn pause-btn" id="pauseBtn">Pause</button>
    <button class="sw-btn lap-btn" id="lapBtn" disabled>Lap</button>
    <button class="sw-btn reset-btn" id="resetBtn">Reset</button>
  </div>

  <div id="lap-section" style="display: none;">
    <div class="sw-lap-header">
      <span> LAP</span>
      <span> LAP SPLIT</span>
      <span> TOTAL</span>
    </div>
    <div class="sw-laps" id="lapsContainer">
      <div class="empty-lap-message">✨ press Lap while running</div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- STOPWATCH CORE ----------
    let startTimestamp = 0;      // reference timestamp (ms)
    let elapsedMs = 0;           // total accumulated time when paused (ms)
    let animationId = null;
    let isRunning = false;

    // Lap tracking
    let currentLapBase = 0;      // elapsedMs at start of current lap
    let lapsArray = [];           // each element: { lapDuration, cumulativeTime }

    // DOM elements
    const mainTimeSpan = document.getElementById('main-time');
    const msSpan = document.getElementById('ms-time');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const lapBtn = document.getElementById('lapBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapSectionDiv = document.getElementById('lap-section');
    const lapsContainer = document.getElementById('lapsContainer');

    // Format milliseconds -> MM:SS.cc
    function formatTime(ms) {
      if (ms < 0) ms = 0;
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const centiseconds = Math.floor((ms % 1000) / 10);
      const mainStr = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
      const msStr = `${centiseconds < 10 ? '0' : ''}${centiseconds}`;
      return { main: mainStr, ms: msStr };
    }

    function updateDisplay() {
      const { main, ms } = formatTime(elapsedMs);
      mainTimeSpan.textContent = main;
      msSpan.textContent = ms;
    }

    // RAF loop: updates elapsed time while running
    function tick() {
      if (!isRunning) return;
      const now = Date.now();
      elapsedMs = now - startTimestamp;
      if (elapsedMs < 0) elapsedMs = 0;
      updateDisplay();
      animationId = requestAnimationFrame(tick);
    }

    // ----- Timer actions with START button text to "RUNNING" -----
    function startTimer() {
      if (isRunning) return;
      // resume counting from current elapsedMs
      startTimestamp = Date.now() - elapsedMs;
      isRunning = true;
      animationId = requestAnimationFrame(tick);
      
      // CHANGE START BUTTON TO "RUNNING" (visual + text change)
      startBtn.textContent = 'RUNNING';
      startBtn.classList.add('running-active');   // adds extra glow / style
      // Keep the green base but now it shows running state
      
      // enable lap button when running
      lapBtn.disabled = false;
    }

    function pauseTimer() {
      if (!isRunning) return;
      cancelAnimationFrame(animationId);
      animationId = null;
      // final synchronization
      elapsedMs = Date.now() - startTimestamp;
      if (elapsedMs < 0) elapsedMs = 0;
      updateDisplay();
      isRunning = false;
      
      // REVERT START BUTTON TO "Start" (not running anymore)
      startBtn.textContent = 'Start';
      startBtn.classList.remove('running-active');
      
      // disable lap button while paused
      lapBtn.disabled = true;
    }

    // full reset: stop, clear laps, set 0
    function fullReset() {
      if (isRunning) {
        cancelAnimationFrame(animationId);
        animationId = null;
        isRunning = false;
      }
      elapsedMs = 0;
      lapsArray = [];
      currentLapBase = 0;
      updateDisplay();
      
      // Reset start button appearance and text
      startBtn.textContent = 'Start';
      startBtn.classList.remove('running-active');
      
      // disable lap button
      lapBtn.disabled = true;
      
      // re-render laps & hide section if empty
      renderLapList();
      if (lapsArray.length === 0) {
        lapSectionDiv.style.display = 'none';
      } else {
        lapSectionDiv.style.display = 'block';
      }
    }

    // Helper: best/worst indices for lap highlighting
    function getBestWorstIndices() {
      if (lapsArray.length === 0) return { bestIdx: -1, worstIdx: -1 };
      let bestVal = Infinity, worstVal = -Infinity;
      let bestIdx = -1, worstIdx = -1;
      for (let i = 0; i < lapsArray.length; i++) {
        const dur = lapsArray[i].lapDuration;
        if (dur < bestVal) { bestVal = dur; bestIdx = i; }
        if (dur > worstVal) { worstVal = dur; worstIdx = i; }
      }
      return { bestIdx, worstIdx };
    }

    // Render lap list with best/worst highlight
    function renderLapList() {
      if (!lapsContainer) return;
      if (lapsArray.length === 0) {
        lapsContainer.innerHTML = '<div class="empty-lap-message">⏱️ press <span style="color:#e6a017;">Lap</span> while stopwatch runs</div>';
        return;
      }

      const { bestIdx, worstIdx } = getBestWorstIndices();
      let html = '';
      // display latest lap first (reverse chronological)
      for (let i = lapsArray.length - 1; i >= 0; i--) {
        const lap = lapsArray[i];
        const lapNumber = i + 1;
        const lapFmt = formatTime(lap.lapDuration);
        const totalFmt = formatTime(lap.cumulativeTime);
        
        let highlightClass = '';
        if (lapsArray.length > 1) {
          if (i === bestIdx) highlightClass = 'lap-best';
          if (i === worstIdx) highlightClass = 'lap-worst';
        }
        
        html += `
          <div class="sw-lap-row">
            <span class="sw-lap-num">LAP ${lapNumber}</span>
            <span class="sw-lap-time ${highlightClass}">${lapFmt.main}.${lapFmt.ms}</span>
            <span class="sw-lap-delta">${totalFmt.main}.${totalFmt.ms}</span>
          </div>
        `;
      }
      lapsContainer.innerHTML = html;
      if (lapsContainer.parentElement) {
        lapsContainer.scrollTop = 0;
      }
    }

    // Record Lap: based on current elapsedMs (only allowed when running)
    function recordLap() {
      if (!isRunning) return;
      
      const totalNow = elapsedMs;
      let lapDuration;
      
      if (lapsArray.length === 0) {
        lapDuration = totalNow;
        currentLapBase = totalNow;
      } else {
        lapDuration = totalNow - currentLapBase;
        if (lapDuration < 0) lapDuration = 0;
        currentLapBase = totalNow;
      }
      
      lapsArray.push({
        lapDuration: lapDuration,
        cumulativeTime: totalNow
      });
      
      renderLapList();
      
      // make lap section visible if hidden
      if (lapSectionDiv.style.display !== 'block') {
        lapSectionDiv.style.display = 'block';
      }
      
      // micro feedback on lap button
      lapBtn.style.transform = 'scale(0.96)';
      setTimeout(() => { if (lapBtn) lapBtn.style.transform = ''; }, 120);
    }

    // ---------- EVENT BINDING with dedicated START/PAUSE ----------
    function attachEvents() {
      // START button (green) - starts timer and changes to "RUNNING"
      if (startBtn) {
        startBtn.removeEventListener('click', startHandler);
        startBtn.addEventListener('click', startHandler);
      }
      // PAUSE button (orange) - pauses timer and sets start button back to "Start"
      if (pauseBtn) {
        pauseBtn.removeEventListener('click', pauseHandler);
        pauseBtn.addEventListener('click', pauseHandler);
      }
      // LAP button (yellow)
      if (lapBtn) {
        lapBtn.removeEventListener('click', lapHandler);
        lapBtn.addEventListener('click', lapHandler);
      }
      // RESET button (red)
      if (resetBtn) {
        resetBtn.removeEventListener('click', resetHandler);
        resetBtn.addEventListener('click', resetHandler);
      }
    }

    function startHandler() {
      // if timer is NOT running -> start, set button to "RUNNING"
      if (!isRunning) {
        startTimer();
      }
      // if already running, clicking start does nothing (avoids conflict)
    }

    function pauseHandler() {
      if (isRunning) {
        pauseTimer();  // this will change start button back to "Start"
      }
    }

    function lapHandler() {
      recordLap();
    }

    function resetHandler() {
      fullReset();
    }

    // ---- initialize and ensure correct states ----
    function init() {
      isRunning = false;
      elapsedMs = 0;
      lapsArray = [];
      currentLapBase = 0;
      updateDisplay();
      lapBtn.disabled = true;
      startBtn.textContent = 'Start';
      startBtn.classList.remove('running-active');
      renderLapList();
      lapSectionDiv.style.display = 'none';
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    init();
    attachEvents();

    // Additional safe overrides to keep behavior consistent
    window.startTimer = startTimer;
    window.pauseTimer = pauseTimer;
    window.fullReset = fullReset;
    window.recordLap = recordLap;

    // Force button colors and styles (extra insurance)
    startBtn.style.backgroundColor = '#1f9a5e';
    pauseBtn.style.backgroundColor = '#e68a2e';
    lapBtn.style.backgroundColor = '#e6a017';
    resetBtn.style.backgroundColor = '#c73f2b';
    
    // Final check: ensure that if start is clicked multiple times, we don't double-run
    // and running visual remains until pause or reset
    // edge: when pause is clicked, start button reverts to "Start"
    // Also, reset while running resets and turns button to "Start"
    
    // Add keyboard / cleanup
    window.addEventListener('beforeunload', () => {
      if (animationId) cancelAnimationFrame(animationId);
    });
    
    // For touch/mobile: ensure disabled state works
    const stylePulse = document.createElement('style');
    stylePulse.textContent = `
      .running-active {
        position: relative;
        transition: all 0.2s;
      }
      .running-active::after {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: rgba(80, 227, 165, 0.3);
        border-radius: 60px;
        z-index: -1;
        opacity: 0.6;
        animation: borderGlow 1.5s infinite alternate;
      }
      @keyframes borderGlow {
        0% { opacity: 0.2; transform: scale(0.98);}
        100% { opacity: 0.7; transform: scale(1.02);}
      }
    `;
    document.head.appendChild(stylePulse);
  })();
</script>
</body>
</html>
